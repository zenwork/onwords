<IfModule mod_ssl.c>
  <VirtualHost *:443>
        ServerName onwords.ch
        ServerAlias www.onwords.ch
        ServerAdmin admin@onwords.ch
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        ProxyRequests Off
        <Proxy *>
          Order deny,allow
          Allow from all
        </Proxy>

        ProxyPass / http://127.0.0.1:3000/
        ProxyPassReverse / http://127.0.0.1:3000/

        <Location />
          Order allow,deny
          Allow from all
        </Location>

        Include /etc/letsencrypt/options-ssl-apache.conf
        SSLCertificateFile /etc/letsencrypt/live/www.onwords.ch/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/www.onwords.ch/privkey.pem
   </VirtualHost>
</IfModule>
